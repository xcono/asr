# Qwen3-ASR-1.7B STT server — OpenAI-compatible BATCH (/v1/audio/transcriptions) plus
# WebSocket STREAMING (/v1/asr/stream) on :8008, via vLLM. Multilingual (English + Russian);
# sub-100 ms first-partials for turn-taking. This is the streaming / multilingual backend.
#
#   docker compose -f docker.qwen.yaml up -d         # (make up-qwen)
#
# One of two interchangeable STT backends in this repo; pick exactly ONE — this file
# (Qwen3-ASR, streaming/multilingual) or docker.giga.yaml (GigaAM, batch/ru). Both expose
# `stt:8008`, join the `voices` network, and reuse the shared HF weight cache, so xcono/voices
# selects the backend by which file it `include:`s.
#
# TRADE-OFF vs GigaAM batch: streaming + English, but it's vLLM → it RESERVES VRAM via
# gpu_memory_utilization (~6.3 GB vs GigaAM's ~4.7 GB actual), so re-check GPU0 headroom against
# tts. ASR_ENFORCE_EAGER=1 skips CUDA graphs to keep it lean. DO NOT build/up in a sandbox —
# needs the GPU box + NVIDIA Container Toolkit.

name: asr

services:
  stt:
    build:
      context: ./llm/qwen3          # Qwen3-ASR vLLM streaming server (asr_server.py)
    image: xcono-asr-qwen3
    ports:
      - "8008:8008"
    environment:
      ASR_MODEL: ${ASR_MODEL:-Qwen/Qwen3-ASR-1.7B}
      ASR_LANGUAGE: ${ASR_LANGUAGE:-Russian}   # "auto" / per-request / WS ?language= for English
      ASR_ENFORCE_EAGER: "1"                    # skip CUDA graphs → frees the KV slice, fast restart
      ASR_GPU_MEM_UTIL: ${ASR_GPU_MEM_UTIL:-0.30}
    volumes:
      - hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${ASR_GPU:-0}"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 240s             # vLLM warmup (weights + profiling) runs longer than GigaAM
    restart: unless-stopped

# Shared with the xcono/voices stack so weights are downloaded once.
volumes:
  hf-cache:
    name: llms_hf-cache
    external: true

# Literal `voices` network so this service and the voices orchestrator co-reside.
networks:
  default:
    name: voices
