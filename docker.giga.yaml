# GigaAM v3 STT server (default) — OpenAI-compatible BATCH transcription on :8008.
# Open SOTA Russian ASR, ru-only, batch-only (no streaming server exists for it).
#
#   docker compose -f docker.giga.yaml up -d         # (make up)
#
# One of two interchangeable STT backends in this repo; pick exactly ONE — this file
# (GigaAM, batch/ru) or docker.qwen.yaml (Qwen3-ASR, streaming/multilingual). Both expose
# `stt:8008`, join the `voices` network, and reuse the shared HF weight cache, so xcono/voices
# selects the backend by which file it `include:`s. DO NOT build/up in a sandbox — needs the
# GPU box + NVIDIA Container Toolkit.

name: asr

services:
  stt:
    build:
      context: ./llm/giga3          # GigaAM batch server (asr_server.py)
    image: xcono-asr-giga
    ports:
      - "8008:8008"
    environment:
      GIGAAM_MODEL: ${GIGAAM_MODEL:-v3_rnnt}     # v3_e2e_rnnt for punctuation + normalization
      GIGAAM_DEVICE: cuda:0
      GIGAAM_DOWNLOAD_ROOT: /root/.cache/huggingface/gigaam
    volumes:
      - hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${ASR_GPU:-0}"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    restart: unless-stopped

# Shared with the xcono/voices stack so weights are downloaded once.
volumes:
  hf-cache:
    name: llms_hf-cache
    external: true

# Literal `voices` network so this service and the voices orchestrator co-reside.
networks:
  default:
    name: voices
